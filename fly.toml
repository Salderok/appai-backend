# Fly.io deployment config for the appAi backend.
#
# First-time setup:
#   fly launch --no-deploy --copy-config
#   fly postgres create --name appai-db --region <region>
#   fly postgres attach --app appai appai-db
#   fly secrets set DEVICE_KEY=... OPENAI_API_KEY=... \
#                   ANTHROPIC_API_KEY=... GEMINI_API_KEY=... \
#                   DEEPSEEK_API_KEY=...
#   fly deploy

app = "appai"
primary_region = "fra"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_HOST = "0.0.0.0"
  APP_PORT = "8000"
  APP_LOG_LEVEL = "INFO"
  EMBEDDING_PROVIDER = "openai"
  TTS_PROVIDER = "openai"
  WHISPER_PROVIDER = "openai"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

[mounts]
  source = "appai_uploads"
  destination = "/app/uploads"

[deploy]
  release_command = "alembic upgrade head"
